name: ci
on:
  push:
    branches:
      - master
      - main
      - 'releases/*'
permissions:
  contents: write
jobs:
  deploy:
    env:
      CONFIG_FILE: docs/mkdocs.yml
      REQUIREMENTS: docs/requirements.txt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for mike versioning
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - uses: actions/setup-python@v4
        with:
          python-version: 3.x
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV
      - uses: actions/cache@v3
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      - run: pip install mkdocs-material mkdocs-glightbox mkdocs-include-markdown-plugin mike
      - name: Deploy with mike
        run: |
          # Deploy all versions with separate pushes
          mike deploy --push --update-aliases --config-file docs/mkdocs.yml latest default
          mike deploy --push --config-file docs/mkdocs-ddd-melbourne.yml ddd-melbourne
          mike deploy --push --config-file docs/mkdocs-advanced.yml advanced
          
          # Set default
          mike set-default --push --config-file docs/mkdocs.yml latest
